steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  # Build
  - name: 'node:20'
    entrypoint: 'node'
    args: ['build_script.cjs']
    env:
      - 'NODE_ENV=production'
  # Install Firebase CLI and Deploy
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting:test --token "$FIREBASE_TOKEN"
    secretEnv: ['FIREBASE_TOKEN']
availableSecrets:
  secretManager:
    - versionName: projects/wolf-hms/secrets/FIREBASE_TOKEN/versions/latest
      env: 'FIREBASE_TOKEN'
options:
  logging: CLOUD_LOGGING_ONLY
