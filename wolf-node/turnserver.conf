# Wolf TURN Server Configuration
# Coturn settings for WebRTC NAT traversal
#
# VPS IP: 163.245.208.73
# Domain: turn.wolfhms.com (optional)

# Listening settings
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# External IP (Your InterServer VPS)
external-ip=163.245.208.73

# Relay ports (UDP for media)
min-port=49152
max-port=65535

# Authentication
realm=wolfhms.com
server-name=wolf-turn

# Static user (simple approach)
# Format: username:password
user=wolf:wolf-turn-password-change-me

# Or use long-term credentials
lt-cred-mech

# Logging
log-file=/var/log/coturn.log
verbose

# Fingerprint for enhanced security
fingerprint

# Disable multicast (not needed for 1:1 calls)
no-multicast-peers

# Performance tuning
proc=-1
